name: "🐛 Bug Report"
description: Report a bug to help us improve FileUni
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug!
        Please write the issue in English (machine translation is OK).

  - type: checkboxes
    id: pre-check
    attributes:
      label: Before submitting
      options:
        - label: I have searched existing issues to avoid duplicates
          required: true
