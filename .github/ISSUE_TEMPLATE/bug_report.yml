name: "🐛 Bug Report"
description: Report a bug to help us improve FileUni
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug!
        Please write the issue in English (machine translation is OK). [Why English?](https://github.com/FileUni/FileUni-Project/blob/main/CONTRIBUTING.md#language-policy)

  - type: checkboxes
    id: pre-check
    attributes:
      label: Before submitting
      options:
        - label: I have searched existing issues to avoid duplicates
          required: true

  - type: textarea
    id: describe
    attributes:
      label: Describe the bug
      description: What happened?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context / detailed description
      description: Logs, screenshots, version/OS, configuration, or anything else that helps.
