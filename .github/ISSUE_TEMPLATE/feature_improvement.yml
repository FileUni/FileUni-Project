name: "✨ Feature Improvement"
description: Suggest improvements to existing features
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for your suggestion! We're currently focusing on stabilizing and optimizing existing features.
        
        This form is for **improvements to existing features only**. For completely new feature ideas, please use [Discussions](https://github.com/FileUni/FileUni-Project/discussions).
        
        ---
        
        **Please use English when describing your suggestion.** Imperfect grammar or machine-translated English is perfectly fine - we just want to understand your idea!
        
        ---
        
        请使用英语描述您的建议。语法不完美或机器翻译的英语完全可以接受 - 我们只想理解您的想法！
        
        Bitte beschreiben Sie Ihren Vorschlag auf Englisch. Unvollkommene Grammatik oder maschinell übersetztes Englisch ist völlig akzeptabel - wir möchten Ihre Idee verstehen!
        
        Veuillez décrire votre suggestion en anglais. Une grammaire imparfaite ou un anglais traduit par machine est tout à fait acceptable - nous voulons juste comprendre votre idée!
        
        Si prega di descrivere il suggerimento in inglese. Una grammatica imperfetta o un inglese tradotto automaticamente è perfettamente accettabile - vogliamo solo capire la vostra idea!
        
        英語で提案を説明してください。文法が不完全でも、機械翻訳でも構いません - アイデアを理解したいだけです！
        
        제안을 영어로 설명해 주세요. 문법이 완벽하지 않거나 기계 번역된 영어도 완전히 괜찮습니다 - 우리는 단지 아이디어를 이해하고 싶을 뿐입니다!
        
        Por favor, describa su sugerencia en inglés. La gramática imperfecta o el inglés traducido por máquina es perfectamente aceptable - ¡solo queremos entender su idea!
        
        Por favor, descreva sua sugestão em inglês. Gramática imperfeita ou inglês traduzido por máquina é perfeitamente aceitável - só queremos entender sua ideia!
        
        يرجى وصف اقتراحك باللغة الإنجليزية. القواعد غير المثالية أو الإنجليزية المترجمة آليًا مقبولة تمامًا - نريد فقط فهم فكرتك!
        
        Пожалуйста, опишите ваше предложение на английском. Несовершенная грамматика или машинный перевод вполне допустимы - мы просто хотим понять вашу идею!
        
        Lütfen önerinizi İngilizce olarak açıklayın. Kusurlu dilbilgisi veya makine çevirisi İngilizce tamamen kabul edilebilir - sadece fikrinizi anlamak istiyoruz!

  - type: checkboxes
    id: pre-check
    attributes:
      label: Before submitting
      options:
        - label: This is an improvement to an EXISTING feature (not a new feature request)
          required: true
        - label: I have searched existing issues and discussions to avoid duplicates
          required: true

  - type: dropdown
    id: area
    attributes:
      label: Feature Area
      options:
        - File Management
        - User Interface
        - Authentication & Users
        - Performance
        - API
        - Other
    validations:
      required: true

  - type: textarea
    id: current
    attributes:
      label: Current Behavior
      description: How does the feature currently work?
    validations:
      required: true

  - type: textarea
    id: improvement
    attributes:
      label: Proposed Improvement
      description: What improvement would you like to see?
    validations:
      required: true

  - type: textarea
    id: benefit
    attributes:
      label: Benefits
      description: How would this benefit users?