name: "✨ Feature Improvement"
description: Suggest improvements to existing features
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for your suggestion!
        This form is for **improvements to existing features**.
        For brand new feature ideas, please use [Discussions](https://github.com/FileUni/FileUni-Project/discussions).
        Please describe in English (machine translation is OK).

  - type: checkboxes
    id: pre-check
    attributes:
      label: Before submitting
      options:
        - label: This is an improvement to an EXISTING feature
          required: true
        - label: I have searched existing issues and discussions
          required: true

  - type: textarea
    id: current
    attributes:
      label: Current behavior / pain point
      description: What is frustrating or inefficient today?
    validations:
      required: true

  - type: textarea
    id: improvement
    attributes:
      label: Proposed improvement
      description: What should change? Include UI/UX details if relevant.
    validations:
      required: true

  - type: textarea
    id: benefit
    attributes:
      label: Why is it better? (optional)

  - type: textarea
    id: extra
    attributes:
      label: Extra context (optional)
      description: Screenshots, examples, links, or alternative approaches.
