name: "✨ Feature Improvement"
description: Suggest improvements to existing features
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for your suggestion!
        Please describe in English (machine translation is OK).

  - type: checkboxes
    id: pre-check
    attributes:
      label: Before submitting
      options:
        - label: I have searched existing issues to avoid duplicates
          required: true

  - type: textarea
    id: description
    attributes:
      label: Detailed description
      description: What should be improved? Include examples, screenshots, or current behavior if helpful.
    validations:
      required: true
