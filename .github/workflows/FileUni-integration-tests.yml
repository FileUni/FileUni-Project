      - name: Sync favicon
        run: bash workspace/script/fileSync.sh

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache Bun
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            workspace/frontends/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('workspace/frontends/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Build frontend assets
        working-directory: workspace/frontends
        run: |
          bun install --frozen-lockfile
          bun run build
          test -f dist/index.html

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            workspace -> target

      - name: Run web API smoke tests on PostgreSQL + DB KV
        working-directory: workspace
        env:
          CARGO_TERM_COLOR: always
          FILEUNI_TEST_DB_BACKEND: postgres
          FILEUNI_TEST_KV_BACKEND: database
          FILEUNI_TEST_POSTGRES_DSN: postgres://postgres:postgres@127.0.0.1:5432/fileuni_test
          RUST_BACKTRACE: 1
          RUST_TEST_THREADS: 1
        run: bash apps/integration-tests/run-smoke-test.sh web_api_smoke

