name: FileUni Integration Tests

on:
  workflow_dispatch:
    inputs:
      workspace_ref:
        description: "Source ref in FileUni-WorkSpace (branch/tag/sha). Default: main"
        required: false
        default: "main"
  schedule:
    - cron: "30 20 * * *"

permissions:
  contents: read

concurrency:
  group: integration-tests-${{ github.event.inputs.workspace_ref || github.run_id }}
  cancel-in-progress: true

env:
  WORKSPACE_REPO: FileUni/FileUni-WorkSpace

jobs:
  web-api-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve workspace ref
        id: resolve-ref
        run: |
          ref="${{ github.event.inputs.workspace_ref }}"
          echo "ref=${ref:-main}" >> "$GITHUB_OUTPUT"

      - name: Checkout workspace
        uses: actions/checkout@v4
        with:
          repository: ${{ env.WORKSPACE_REPO }}
          ref: ${{ steps.resolve-ref.outputs.ref }}
          token: ${{ secrets.FILEUNI_WORKSPACE_PAT }}
          path: workspace
          submodules: true
          fetch-depth: 0

      - name: Sync favicon
        run: bash workspace/script/fileSync.sh

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache Bun
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            workspace/frontends/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('workspace/frontends/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Build frontend assets
        working-directory: workspace/frontends
        run: |
          bun install --frozen-lockfile
          bun run build
          test -f dist/index.html

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            workspace -> target

      - name: Run web API smoke tests
        working-directory: workspace
        env:
          CARGO_TERM_COLOR: always
          FILEUNI_TEST_DB_BACKEND: sqlite
          FILEUNI_TEST_KV_BACKEND: dashmap
          RUST_BACKTRACE: 1
          RUST_TEST_THREADS: 1
        run: bash apps/integration-tests/run-smoke-test.sh web_api_smoke

  web-api-smoke-postgres-database:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: fileuni_test
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d fileuni_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Resolve workspace ref
        id: resolve-ref
        run: |
          ref="${{ github.event.inputs.workspace_ref }}"
          echo "ref=${ref:-main}" >> "$GITHUB_OUTPUT"

      - name: Checkout workspace
