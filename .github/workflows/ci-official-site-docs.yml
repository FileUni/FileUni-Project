name: Official Site Docs CI

# This workflow is dispatched when OfficialSiteDocs/ or ts_shared/ changes are detected
# by FileUni-WorkSpace/.github/workflows/trigger-public-project-ci.yml.

on:
  workflow_dispatch:
    inputs:
      workspace_ref:
        description: "Source ref in FileUni-WorkSpace (branch/tag/sha). Default: main"
        required: false
        default: "main"

permissions:
  contents: read

concurrency:
  group: ci-official-site-docs-${{ github.event.inputs.workspace_ref || github.run_id }}
  cancel-in-progress: true

env:
  WORKSPACE_REPO: FileUni/FileUni-WorkSpace

jobs:
  official-site-docs-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve workspace ref
        id: resolve-ref
        run: |
          ref="${{ github.event.inputs.workspace_ref }}"
          echo "ref=${ref:-main}" >> "$GITHUB_OUTPUT"

      - name: Checkout workspace
        uses: actions/checkout@v4
        with:
          repository: ${{ env.WORKSPACE_REPO }}
          ref: ${{ steps.resolve-ref.outputs.ref }}
          token: ${{ secrets.FILEUNI_PRIVATE_WORKSPACE_READ_TOKEN }}
          path: workspace
          submodules: true
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache Bun
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            workspace/OfficialSiteDocs/node_modules
          key: official-site-docs-bun-${{ runner.os }}-${{ hashFiles('workspace/OfficialSiteDocs/bun.lock', 'workspace/ts_shared/package.json', 'workspace/ts_shared/i18n-core/**', 'workspace/ts_shared/opencc-js.d.ts') }}
          restore-keys: |
            official-site-docs-bun-${{ runner.os }}-

      - name: Verify OfficialSiteDocs
        working-directory: workspace/OfficialSiteDocs
        run: |
          bun install --frozen-lockfile
          bun run verify
