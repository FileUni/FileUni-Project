  tauri-e2e:
    name: tauri-e2e-${{ matrix.os }}
    runs-on: ${{ matrix.runner }}
    needs: prepare-smoke-bundle
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            runner: ubuntu-latest
          - os: windows
            runner: windows-latest
    steps:
      - name: Checkout workspace
        uses: actions/checkout@v4
        with:
          repository: ${{ env.WORKSPACE_REPO }}
          ref: ${{ needs.prepare-smoke-bundle.outputs.workspace_ref }}
          token: ${{ secrets.FILEUNI_PRIVATE_WORKSPACE_READ_TOKEN }}
          path: workspace
          submodules: true
          fetch-depth: 0

      - name: Setup Bun
        id: setup-bun-tauri-e2e
        uses: oven-sh/setup-bun@v2
        continue-on-error: true

      - name: Fallback install Bun via npm
        if: steps.setup-bun-tauri-e2e.outcome == 'failure'
        shell: bash
        run: |
          set -euo pipefail
          npm install -g bun@1.3.12
          bun --version

      - name: Sync favicon
        run: bash workspace/script/fileSync.sh

      - name: Build frontend assets for Tauri E2E
        working-directory: workspace/frontends
        run: |
          bun install --frozen-lockfile
          bun run build
          test -f dist/index.html

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Disable workspace local linker overrides for Tauri E2E
        if: matrix.os == 'linux'
        working-directory: workspace
        shell: bash
        run: |
          set -euo pipefail
          rm -f .cargo/config.toml .cargo/config

      - name: Show toolchain info (Tauri E2E)
        working-directory: workspace
        shell: bash
        run: |
          set -euo pipefail
          echo "Rust version: $(rustc --version)"
          echo "Cargo version: $(cargo --version)"

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            workspace -> target

      - name: Install Linux dependencies for Tauri E2E
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            xdg-utils \
            patchelf \
            webkit2gtk-driver \
            xvfb

      - name: Install tauri-driver
        run: cargo install tauri-driver --locked

      - name: Install matching msedgedriver
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          cargo install --git https://github.com/chippers/msedgedriver-tool
          & "$HOME/.cargo/bin/msedgedriver-tool.exe"
          "$HOME/.cargo/bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install Tauri E2E dependencies
        working-directory: workspace/apps/integration-tests/tauri-e2e
        run: bun install --frozen-lockfile

      - name: Run Tauri E2E on Linux
        if: matrix.os == 'linux'
        working-directory: workspace/apps/integration-tests/tauri-e2e
        env:
          FILEUNI_TAURI_E2E_RUNTIME_ROOT: ${{ github.workspace }}/workspace/apps/integration-tests/tauri-e2e/.runtime
          RUSTUP_TOOLCHAIN: stable
        run: xvfb-run -a bun run test

      - name: Run Tauri E2E on Windows
        if: matrix.os == 'windows'
        working-directory: workspace/apps/integration-tests/tauri-e2e
        env:
          FILEUNI_TAURI_E2E_RUNTIME_ROOT: ${{ github.workspace }}\workspace\apps\integration-tests\tauri-e2e\.runtime
          RUSTUP_TOOLCHAIN: stable
        run: bun run test

  postgres-disconnect-smoke:
    name: postgres-disconnect-smoke
    runs-on: ubuntu-latest
    needs: prepare-smoke-bundle
    timeout-minutes: 90
    steps:
      - name: Checkout workspace
        uses: actions/checkout@v4
        with:
          repository: ${{ env.WORKSPACE_REPO }}
          ref: ${{ needs.prepare-smoke-bundle.outputs.workspace_ref }}
          token: ${{ secrets.FILEUNI_PRIVATE_WORKSPACE_READ_TOKEN }}
          path: workspace
          submodules: true
          fetch-depth: 0

      - name: Download smoke bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.SMOKE_BUNDLE_ARTIFACT }}
          path: smoke-bundle

      - name: Start PostgreSQL container
        shell: bash
        run: |
          set -euo pipefail

          docker rm -f fileuni-it-postgres-disconnect >/dev/null 2>&1 || true
          docker run -d --name fileuni-it-postgres-disconnect \
            -e POSTGRES_DB=fileuni_test \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_USER=postgres \
            -p 55432:5432 \
            --health-cmd "pg_isready -U postgres -d fileuni_test" \
            --health-interval 5s \
            --health-timeout 5s \
            --health-retries 20 \
            postgres:17-alpine

          for _ in $(seq 1 60); do
            if [ "$(docker inspect -f '{{.State.Health.Status}}' fileuni-it-postgres-disconnect)" = "healthy" ]; then
              exit 0
            fi
            sleep 2
          done

          docker logs fileuni-it-postgres-disconnect
          exit 1

      - name: Run PostgreSQL disconnect smoke test
        shell: bash
        env:
          FILEUNI_TEST_BINARY: ${{ github.workspace }}/smoke-bundle/fileuni
          FILEUNI_TEST_DB_BACKEND: postgres
          FILEUNI_TEST_KV_BACKEND: dashmap
          FILEUNI_TEST_POSTGRES_DSN: postgres://postgres:postgres@127.0.0.1:55432/fileuni_test
          FILEUNI_TEST_ENABLE_POSTGRES_DISCONNECT: 1
          FILEUNI_TEST_POSTGRES_CONTAINER_NAME: fileuni-it-postgres-disconnect
          FILEUNI_TEST_POSTGRES_PORT: 55432
          RUST_BACKTRACE: 1
          RUST_TEST_THREADS: 1
        run: |
          set -euo pipefail

          chmod +x "smoke-bundle/fileuni" "smoke-bundle/web_api_smoke"
          test -x "$FILEUNI_TEST_BINARY"
          "smoke-bundle/web_api_smoke" web_api_smoke_handles_postgres_disconnect_and_recovery --no-capture

      - name: Cleanup PostgreSQL container
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          docker rm -f fileuni-it-postgres-disconnect >/dev/null 2>&1 || true

  low-resource-basic-smoke:
    name: ${{ matrix.job_name }}
    runs-on: ubuntu-latest
    needs: prepare-smoke-bundle
    timeout-minutes: 90
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        include:
          - job_name: low-resource-web-api-smoke
            test_name: web_api_low_resource_smoke
          - job_name: low-resource-webdav-smoke
            test_name: webdav_low_resource_smoke
          - job_name: low-resource-web-api-restart-smoke
            test_name: web_api_low_resource_restart_smoke
    steps:
      - name: Download smoke bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.SMOKE_BUNDLE_ARTIFACT }}
          path: smoke-bundle

      - name: Prepare low-resource smoke bundle
        shell: bash
        run: |
          set -euo pipefail
          chmod +x \
            "smoke-bundle/fileuni" \
            "smoke-bundle/${{ matrix.test_name }}"

          cat > "smoke-bundle/fileuni-low-resource-wrapper" <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail

          bundle_dir="$(cd -- "$(dirname -- "$0")" && pwd)"
          runtime_dir=""
          prev=""
          for arg in "$@"; do
            if [ "$prev" = "--runtime-dir" ] || [ "$prev" = "-R" ]; then
              runtime_dir="$arg"
              break
            fi
            prev="$arg"
          done

          if [ -z "$runtime_dir" ]; then
            printf 'missing -R/--runtime-dir argument for low-resource wrapper\n' >&2
            exit 64
          fi

          exec docker run --rm \
            --network host \
            --memory=48m \
            --memory-swap=48m \
            --cpus=0.25 \
            -e FILEUNI_DEV_SYNC_OPENAPI=0 \
            -v "$bundle_dir:/smoke-bundle:ro" \
            -v "$runtime_dir:$runtime_dir" \
            ubuntu:24.04 \
            /smoke-bundle/fileuni "$@"
          EOF

          chmod +x "smoke-bundle/fileuni-low-resource-wrapper"

          docker pull ubuntu:24.04

      - name: Run low-resource smoke test
        shell: bash
        env:
          FILEUNI_TEST_BINARY: ${{ github.workspace }}/smoke-bundle/fileuni-low-resource-wrapper
          FILEUNI_TEST_DB_BACKEND: sqlite
          FILEUNI_TEST_KV_BACKEND: database
          FILEUNI_DEV_SYNC_OPENAPI: 0
          RUST_BACKTRACE: 1
          RUST_TEST_THREADS: 1
        run: |
          set -euo pipefail

          test -x "$FILEUNI_TEST_BINARY"
          "smoke-bundle/${{ matrix.test_name }}" --no-capture

