name: Rust Integration CI

on:
  workflow_dispatch:
    inputs:
      workspace_ref:
        description: "Source ref in FileUni-WorkSpace (branch/tag/sha). Default: main"
        required: false
        default: "main"

permissions:
  contents: read

concurrency:
  group: ci-rust-integration-single-flight
  cancel-in-progress: true

env:
  WORKSPACE_REPO: FileUni/FileUni-WorkSpace
  SMOKE_BUNDLE_ARTIFACT: rust-integration-smoke-bundle

jobs:
  prepare-smoke-bundle:
    name: Prepare smoke bundle
    runs-on: ubuntu-latest
    timeout-minutes: 90
    outputs:
      workspace_ref: ${{ steps.resolve-ref.outputs.ref }}
    steps:
      - name: Resolve workspace ref
        id: resolve-ref
        shell: bash
        run: |
          set -euo pipefail

          ref="${{ github.event.inputs.workspace_ref }}"
          echo "ref=${ref:-main}" >> "$GITHUB_OUTPUT"

      - name: Checkout workspace
        uses: actions/checkout@v4
        with:
          repository: ${{ env.WORKSPACE_REPO }}
          ref: ${{ steps.resolve-ref.outputs.ref }}
          token: ${{ secrets.FILEUNI_PRIVATE_WORKSPACE_READ_TOKEN }}
          path: workspace
          submodules: true
          fetch-depth: 0

      - name: Sync favicon
        run: bash workspace/script/fileSync.sh

      - name: Setup Bun
        id: setup-bun-prepare
        uses: oven-sh/setup-bun@v2
        continue-on-error: true

      - name: Fallback install Bun via npm
        if: steps.setup-bun-prepare.outcome == 'failure'
        shell: bash
        run: |
          set -euo pipefail
          npm install -g bun@1.3.12
          bun --version

      - name: Cache Bun
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            workspace/frontends/node_modules
          key: rust-ci-bun-${{ runner.os }}-${{ hashFiles('workspace/frontends/bun.lock', 'workspace/ts_shared/package.json', 'workspace/ts_shared/i18n-core/**', 'workspace/ts_shared/opencc-js.d.ts') }}
          restore-keys: |
            rust-ci-bun-${{ runner.os }}-

      - name: Build frontend assets
        working-directory: workspace/frontends
        run: |
          bun install --frozen-lockfile
          bun run build
          test -f dist/index.html

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set default Rust toolchain
        shell: bash
        run: |
          set -euo pipefail
          rustup default stable

      - name: Show toolchain info
        working-directory: workspace
        shell: bash
        run: |
          set -euo pipefail
          echo "Rust version: $(rustc --version)"
          echo "Cargo version: $(cargo --version)"
          cat rust-toolchain.toml 2>/dev/null || echo "No rust-toolchain.toml found"

      - name: Install system dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential pkg-config clang mold

      - name: Disable workspace local linker overrides in CI
        working-directory: workspace
        shell: bash
        run: |
          set -euo pipefail
          rm -f .cargo/config.toml .cargo/config

      - name: Normalize Linux build environment for smoke bundle
        working-directory: workspace
        shell: bash
        run: |
          set -euo pipefail
          unset NIX_CC NIX_CFLAGS_COMPILE NIX_LDFLAGS NIX_LD NIX_BINTOOLS_WRAPPER_TARGET_HOST_x86_64_unknown_linux_gnu || true
          unset CC CXX CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER RUSTFLAGS || true
          printf 'cc=' && command -v cc || true
          printf 'clang=' && command -v clang || true
          printf 'ldd=' && command -v ldd || true
          ldd --version | sed -n '1,2p' || true

      - name: Verify linker
        shell: bash
        run: |
          set -euo pipefail
          which clang && clang --version
          which mold && mold --version

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            workspace -> target

      - name: Build smoke bundle
        working-directory: workspace
        shell: bash
        env:
          RUST_BACKTRACE: full
        run: |
          set -euo pipefail

          bundle_dir="$PWD/.ci/smoke-bundle"
          mkdir -p "$bundle_dir"

          echo "=== Building fileuni ==="
          cargo build --locked -p fileuni --bin fileuni --message-format=json 2>&1 \
            > "$bundle_dir/build.jsonl" || {
              echo "=== Build failed ==="
              cat "$bundle_dir/build.jsonl"
              exit 1
            }
          echo "=== Building fileuni_e2e_server ==="
          cargo build --locked -p fileuni-integration-tests --bin fileuni_e2e_server --message-format=json 2>&1 \
            >> "$bundle_dir/build.jsonl" || {
              echo "=== Build failed ==="
              cat "$bundle_dir/build.jsonl"
              exit 1
            }
          echo "=== Building fileuni_test_server ==="
          cargo build --locked -p fileuni-integration-tests --bin fileuni_test_server --message-format=json 2>&1 \
            >> "$bundle_dir/build.jsonl" || {
              echo "=== Build failed ==="
              cat "$bundle_dir/build.jsonl"
              exit 1
            }
          echo "=== Building tests ==="
          cargo build --locked -p fileuni-integration-tests --tests --message-format=json 2>&1 \
            >> "$bundle_dir/build.jsonl" || {
              echo "=== Build failed ==="
              cat "$bundle_dir/build.jsonl"
              exit 1
            }

          install_compiler_artifact() {
            local target_name="$1"
            local destination_path="$2"
            local executable_path

            executable_path="$(jq -rs --arg target_name "$target_name" '
              map(
                select(
                  .reason == "compiler-artifact"
                  and .target.name == $target_name
                  and (.target.kind[]? == "bin")
                  and .profile.test == false
                  and .executable != null
                )
                | .executable
              )
              | first // empty
            ' "$bundle_dir/build.jsonl")"

            test -n "$executable_path"
            install -m 755 "$executable_path" "$destination_path"
          }

          install_compiler_artifact fileuni "$bundle_dir/fileuni"
          install_compiler_artifact fileuni_e2e_server "$bundle_dir/fileuni_e2e_server"
          install_compiler_artifact fileuni_test_server "$bundle_dir/fileuni_test_server"

          jq -r 'select(.reason == "compiler-artifact" and .profile.test == true and (.target.kind[]? == "test") and .executable != null) | [.target.name, .executable] | @tsv' "$bundle_dir/build.jsonl" \
            | while IFS=$'\t' read -r test_name executable_path; do
                install -m 755 "$executable_path" "$bundle_dir/$test_name"
              done

          for test_name in \
            web_api_smoke \
            cli_runtime_smoke \
            cli_edge_smoke \
            runtime_context_smoke \
            runtime_action_matrix_smoke \
            backup_cli_smoke \
            gui_shared_commands_smoke \
            gui_tooling_smoke \
            service_manager_smoke \
            web_api_frontend_contract_smoke \
            web_api_postgres_contract_smoke \
            archive_wal_amplification_smoke \
            web_api_low_resource_smoke \
            web_api_low_resource_restart_smoke \
            web_api_boundary_smoke \
            user_account_smoke \
            chat_smoke \
            email_basic_smoke \
            externalize_net_website_manager_smoke \
            externalize_net_acme_ddns_smoke \
            acme_ddns_callback_smoke \
            externalize_net_website_manager_proxy_smoke \
            extension_startup_smoke \
            webdav_smoke \
            webdav_low_resource_smoke \
            nextcloud_smoke \
            nextcloud_chunked_smoke \
            s3_smoke \
            s3_multipart_smoke \
            wal_recovery_smoke \
            sftp_smoke \
            ftp_smoke \
            mail_docker_smoke \
            remote_mount_timeout_smoke \
            remote_mount_rclone_smoke \
            public_share_nextcloud_contract_smoke \
            externalize_net_acme_ddns_real_cloudflare_zerossl_smoke
          do
            test -x "$bundle_dir/$test_name"
          done
          test -x "$bundle_dir/fileuni_e2e_server"

      - name: Verify smoke bundle ELF interpreter
        working-directory: workspace
        shell: bash
        run: |
          set -euo pipefail

          bundle_dir="$PWD/.ci/smoke-bundle"
          for binary in "$bundle_dir/fileuni" "$bundle_dir/cli_runtime_smoke" "$bundle_dir/web_api_smoke"; do
            file "$binary"
            interpreter="$(readelf -l "$binary" | sed -n 's/.*Requesting program interpreter: \(.*\)]/\1/p')"
            test -n "$interpreter"
            printf 'interpreter=%s\n' "$interpreter"
            test -e "$interpreter"
          done

      - name: Verify embedded frontend entry
        working-directory: workspace
        shell: bash
        run: |
          set -euo pipefail

          bundle_dir="$PWD/.ci/smoke-bundle"
          log_path="$bundle_dir/frontend-entry-verify.log"
          "$bundle_dir/fileuni_e2e_server" --port 4011 >"$log_path" 2>&1 &
          server_pid=$!

          cleanup() {
            kill "$server_pid" >/dev/null 2>&1 || true
            wait "$server_pid" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          for _ in $(seq 1 60); do
            if curl -fsS "http://127.0.0.1:4011/api/v1/ping" >/dev/null; then
              break
            fi
            sleep 1
          done

          root_html="$(curl -fsS "http://127.0.0.1:4011/")"
          case "$root_html" in
            *"<html"*|*"<!doctype html"*|*"<!DOCTYPE html"*)
              ;;
            *)
              printf '%s\n' "$root_html"
              exit 1
              ;;
          esac

      - name: Upload smoke bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.SMOKE_BUNDLE_ARTIFACT }}
          path: workspace/.ci/smoke-bundle/
          retention-days: 1

  base-smoke:
    name: ${{ matrix.job_name }}
    runs-on: ubuntu-latest
    needs: prepare-smoke-bundle
    timeout-minutes: 90
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        include:
          - job_name: web-api-smoke
            test_name: web_api_smoke
            fileuni_binary: fileuni_test_server
          - job_name: cli-runtime-smoke
            test_name: cli_runtime_smoke
            fileuni_binary: fileuni
          - job_name: cli-edge-smoke
            test_name: cli_edge_smoke
            fileuni_binary: fileuni
          - job_name: runtime-context-smoke
            test_name: runtime_context_smoke
            fileuni_binary: fileuni_test_server
          - job_name: runtime-action-matrix-smoke
            test_name: runtime_action_matrix_smoke
            fileuni_binary: fileuni_test_server
          - job_name: backup-cli-smoke
            test_name: backup_cli_smoke
            fileuni_binary: fileuni
          - job_name: gui-shared-commands-smoke
            test_name: gui_shared_commands_smoke
            fileuni_binary: fileuni_test_server
          - job_name: gui-tooling-smoke
            test_name: gui_tooling_smoke
            fileuni_binary: fileuni_test_server
          - job_name: service-manager-smoke
            test_name: service_manager_smoke
            fileuni_binary: fileuni
          - job_name: web-api-frontend-contract-smoke
            test_name: web_api_frontend_contract_smoke
            fileuni_binary: fileuni_test_server
          - job_name: web-api-postgres-contract-smoke
            test_name: web_api_postgres_contract_smoke
            fileuni_binary: fileuni_test_server
          - job_name: archive-wal-amplification-smoke
            test_name: archive_wal_amplification_smoke
            fileuni_binary: fileuni_test_server
          - job_name: web-api-boundary-smoke
            test_name: web_api_boundary_smoke
            fileuni_binary: fileuni_test_server
          - job_name: user-account-smoke
            test_name: user_account_smoke
            fileuni_binary: fileuni_test_server
          - job_name: chat-smoke
            test_name: chat_smoke
            fileuni_binary: fileuni_test_server
          - job_name: email-basic-smoke
            test_name: email_basic_smoke
            fileuni_binary: fileuni_test_server
          - job_name: externalize-net-website-manager-smoke
            test_name: externalize_net_website_manager_smoke
            fileuni_binary: fileuni_test_server
          - job_name: externalize-net-acme-ddns-smoke
            test_name: externalize_net_acme_ddns_smoke
            fileuni_binary: fileuni_test_server
          - job_name: acme-ddns-callback-smoke
            test_name: acme_ddns_callback_smoke
            fileuni_binary: fileuni_test_server
          - job_name: externalize-net-website-manager-proxy-smoke
            test_name: externalize_net_website_manager_proxy_smoke
            fileuni_binary: fileuni_test_server
          - job_name: extension-startup-smoke
            test_name: extension_startup_smoke
            fileuni_binary: fileuni_test_server
          - job_name: webdav-smoke
            test_name: webdav_smoke
            fileuni_binary: fileuni_test_server
          - job_name: nextcloud-smoke
            test_name: nextcloud_smoke
            fileuni_binary: fileuni_test_server
          - job_name: nextcloud-chunked-smoke
            test_name: nextcloud_chunked_smoke
            fileuni_binary: fileuni_test_server
          - job_name: s3-smoke
            test_name: s3_smoke
            fileuni_binary: fileuni_test_server
          - job_name: s3-multipart-smoke
            test_name: s3_multipart_smoke
            fileuni_binary: fileuni_test_server
          - job_name: wal-recovery-smoke
            test_name: wal_recovery_smoke
            fileuni_binary: fileuni_test_server
          - job_name: sftp-smoke
            test_name: sftp_smoke
            fileuni_binary: fileuni_test_server
          - job_name: ftp-smoke
            test_name: ftp_smoke
            fileuni_binary: fileuni_test_server
          - job_name: public-share-nextcloud-contract-smoke
            test_name: public_share_nextcloud_contract_smoke
            fileuni_binary: fileuni_test_server
    steps:
      - name: Checkout workspace
        uses: actions/checkout@v4
        with:
          repository: ${{ env.WORKSPACE_REPO }}
          ref: ${{ needs.prepare-smoke-bundle.outputs.workspace_ref }}
          token: ${{ secrets.FILEUNI_PRIVATE_WORKSPACE_READ_TOKEN }}
          path: workspace
          submodules: true
          fetch-depth: 0

      - name: Download smoke bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.SMOKE_BUNDLE_ARTIFACT }}
          path: smoke-bundle

      - name: Install 7z
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq p7zip-full
          7z i | sed -n '1,12p'

      - name: Diagnose smoke binary launch
        if: matrix.test_name == 'cli_edge_smoke' || matrix.test_name == 'runtime_context_smoke' || matrix.test_name == 'cli_runtime_smoke' || matrix.test_name == 'service_manager_smoke' || matrix.test_name == 'externalize_net_website_manager_smoke' || matrix.test_name == 'web_api_smoke'
        shell: bash
        env:
          FILEUNI_TEST_BINARY: ${{ github.workspace }}/smoke-bundle/fileuni_test_server
          FILEUNI_TEST_CLI_BINARY: ${{ github.workspace }}/smoke-bundle/fileuni
        run: |
          set -euo pipefail

          export FILEUNI_TEST_BINARY="$GITHUB_WORKSPACE/smoke-bundle/fileuni_test_server"
          export FILEUNI_TEST_CLI_BINARY="$GITHUB_WORKSPACE/smoke-bundle/fileuni"
          printf 'pwd=%s\n' "$PWD"
          uname -a || true
          printf 'FILEUNI_TEST_BINARY=%s\n' "$FILEUNI_TEST_BINARY"
          printf 'FILEUNI_TEST_CLI_BINARY=%s\n' "$FILEUNI_TEST_CLI_BINARY"
          env | sort | grep -E '^(CI|GITHUB|RUNNER|RUST|FILEUNI)_' || true

          ls -lah smoke-bundle || true
          file "smoke-bundle/${{ matrix.test_name }}" "$FILEUNI_TEST_BINARY" || true
          readelf -l "smoke-bundle/${{ matrix.test_name }}" | grep -i interpreter || true
          readelf -l "$FILEUNI_TEST_BINARY" | grep -i interpreter || true
          ldd "smoke-bundle/${{ matrix.test_name }}" || true
          ldd "$FILEUNI_TEST_BINARY" || true

          chmod +x "$FILEUNI_TEST_BINARY" "$FILEUNI_TEST_CLI_BINARY" "smoke-bundle/${{ matrix.test_name }}"

          set +e
          "$FILEUNI_TEST_BINARY" --help > /tmp/fileuni-help.log 2>&1
          fileuni_help_status=$?
          "smoke-bundle/${{ matrix.test_name }}" --help > /tmp/${{ matrix.test_name }}-help.log 2>&1
          test_help_status=$?
          set -e

          printf 'fileuni --help exit=%s\n' "$fileuni_help_status"
          sed -n '1,120p' /tmp/fileuni-help.log || true
          printf '%s --help exit=%s\n' "${{ matrix.test_name }}" "$test_help_status"
          sed -n '1,120p' /tmp/${{ matrix.test_name }}-help.log || true

      - name: Run smoke test
        shell: bash
        env:
          FILEUNI_TEST_BINARY: ${{ github.workspace }}/smoke-bundle/fileuni_test_server
          FILEUNI_TEST_CLI_BINARY: ${{ github.workspace }}/smoke-bundle/fileuni
          RUST_BACKTRACE: 1
          RUST_TEST_THREADS: 1
        run: |
          set -euo pipefail

          export FILEUNI_TEST_BINARY="$GITHUB_WORKSPACE/smoke-bundle/fileuni_test_server"
          export FILEUNI_TEST_CLI_BINARY="$GITHUB_WORKSPACE/smoke-bundle/fileuni"
          printf 'FILEUNI_TEST_BINARY=%s\n' "$FILEUNI_TEST_BINARY"
          printf 'FILEUNI_TEST_CLI_BINARY=%s\n' "$FILEUNI_TEST_CLI_BINARY"
          chmod +x "$FILEUNI_TEST_BINARY" "$FILEUNI_TEST_CLI_BINARY" "smoke-bundle/${{ matrix.test_name }}"
          test -x "$FILEUNI_TEST_BINARY"
          test -x "$FILEUNI_TEST_CLI_BINARY"
          "smoke-bundle/${{ matrix.test_name }}" --no-capture 2>&1 | tee "/tmp/${{ matrix.test_name }}.log"

  real-domain-smoke:
    name: real-externalize-net-acme-ddns-cloudflare-zerossl-smoke
    runs-on: ubuntu-latest
    needs: prepare-smoke-bundle
    timeout-minutes: 180
    steps:
      - name: Checkout workspace
        uses: actions/checkout@v4
        with:
          repository: ${{ env.WORKSPACE_REPO }}
          ref: ${{ needs.prepare-smoke-bundle.outputs.workspace_ref }}
          token: ${{ secrets.FILEUNI_PRIVATE_WORKSPACE_READ_TOKEN }}
          path: workspace
          submodules: true
          fetch-depth: 0

      - name: Download smoke bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.SMOKE_BUNDLE_ARTIFACT }}
          path: smoke-bundle

      - name: Run real domain smoke test
        shell: bash
        env:
          FILEUNI_TEST_BINARY: ${{ github.workspace }}/smoke-bundle/fileuni_test_server
          FILEUNI_RUN_REAL_DOMAIN_TESTS: 1
          TOKEN_CF: ${{ secrets.TOKEN_CF }}
          TOKEN_ZEROSS_EAB_KID: ${{ secrets.TOKEN_ZEROSS_EAB_KID }}
          TOKEN_ZEROSS_EAB_KEY: ${{ secrets.TOKEN_ZEROSS_EAB_KEY }}
          RUST_BACKTRACE: 1
          RUST_TEST_THREADS: 1
        run: |
          set -euo pipefail

          export FILEUNI_TEST_BINARY="$GITHUB_WORKSPACE/smoke-bundle/fileuni_test_server"
          printf 'FILEUNI_TEST_BINARY=%s\n' "$FILEUNI_TEST_BINARY"
          test -n "${TOKEN_CF:-}"
          test -n "${TOKEN_ZEROSS_EAB_KID:-}"
          test -n "${TOKEN_ZEROSS_EAB_KEY:-}"

          chmod +x "smoke-bundle/fileuni_test_server" "smoke-bundle/externalize_net_acme_ddns_real_cloudflare_zerossl_smoke"
          test -x "$FILEUNI_TEST_BINARY"
          "smoke-bundle/externalize_net_acme_ddns_real_cloudflare_zerossl_smoke" --ignored --no-capture 2>&1 | tee "/tmp/externalize_net_acme_ddns_real_cloudflare_zerossl_smoke.log"

  postgres-smoke:
    name: ${{ matrix.job_name }}
    runs-on: ubuntu-latest
    needs: prepare-smoke-bundle
    timeout-minutes: 90
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        include:
          - job_name: web-api-smoke-postgres-database
            test_name: web_api_smoke
            kv_backend: database
          - job_name: web-api-smoke-postgres-redis
            test_name: web_api_smoke
            kv_backend: redis
          - job_name: user-account-smoke-postgres-database
            test_name: user_account_smoke
            kv_backend: database
          - job_name: user-account-smoke-postgres-redis
            test_name: user_account_smoke
            kv_backend: redis
          - job_name: nextcloud-smoke-postgres-database
            test_name: nextcloud_smoke
            kv_backend: database
          - job_name: nextcloud-smoke-postgres-redis
            test_name: nextcloud_smoke
            kv_backend: redis
          - job_name: web-api-contract-postgres-database
            test_name: web_api_postgres_contract_smoke
            kv_backend: database
          - job_name: web-api-contract-postgres-redis
            test_name: web_api_postgres_contract_smoke
            kv_backend: redis
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: fileuni_test
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d fileuni_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout workspace
        uses: actions/checkout@v4
        with:
          repository: ${{ env.WORKSPACE_REPO }}
          ref: ${{ needs.prepare-smoke-bundle.outputs.workspace_ref }}
          token: ${{ secrets.FILEUNI_PRIVATE_WORKSPACE_READ_TOKEN }}
          path: workspace
          submodules: true
          fetch-depth: 0

      - name: Download smoke bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.SMOKE_BUNDLE_ARTIFACT }}
          path: smoke-bundle

      - name: Install 7z
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq p7zip-full
          7z i | sed -n '1,12p'

      - name: Run smoke test
        shell: bash
        env:
          FILEUNI_TEST_BINARY: ${{ github.workspace }}/smoke-bundle/fileuni_test_server
          FILEUNI_TEST_DB_BACKEND: postgres
          FILEUNI_TEST_KV_BACKEND: ${{ matrix.kv_backend }}
          FILEUNI_TEST_KV_REDIS_URL: redis://127.0.0.1:6379/0
          FILEUNI_TEST_POSTGRES_DSN: postgres://postgres:postgres@127.0.0.1:5432/fileuni_test
          RUST_BACKTRACE: 1
          RUST_TEST_THREADS: 1
        run: |
          set -euo pipefail

          export FILEUNI_TEST_BINARY="$GITHUB_WORKSPACE/smoke-bundle/fileuni_test_server"
          printf 'FILEUNI_TEST_BINARY=%s\n' "$FILEUNI_TEST_BINARY"
          chmod +x "smoke-bundle/fileuni_test_server" "smoke-bundle/${{ matrix.test_name }}"
          test -x "$FILEUNI_TEST_BINARY"
          "smoke-bundle/${{ matrix.test_name }}" --no-capture 2>&1 | tee "/tmp/${{ matrix.test_name }}.log"

  mail-smoke:
    name: ${{ matrix.job_name }}
    runs-on: ubuntu-latest
    needs: prepare-smoke-bundle
    timeout-minutes: 90
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - job_name: mail-docker-smoke
            db_backend: sqlite
            kv_backend: dashmap
          - job_name: mail-docker-smoke-postgres-database
            db_backend: postgres
            kv_backend: database
          - job_name: mail-docker-smoke-postgres-redis
            db_backend: postgres
            kv_backend: redis
    services:
      greenmail:
        image: greenmail/standalone:2.1.7
        env:
          GREENMAIL_OPTS: >-
            -Dgreenmail.setup.test.smtp
            -Dgreenmail.setup.test.imap
            -Dgreenmail.hostname=0.0.0.0
