  remote-mount-smoke:
    name: ${{ matrix.job_name }}
    runs-on: ubuntu-latest
    needs: prepare-smoke-bundle
    timeout-minutes: 90
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        include:
          - job_name: remote-mount-rclone-smoke
            test_name: remote_mount_rclone_smoke
          - job_name: remote-mount-timeout-smoke
            test_name: remote_mount_timeout_smoke
    steps:
      - name: Checkout workspace
        uses: actions/checkout@v4
        with:
          repository: ${{ env.WORKSPACE_REPO }}
          ref: ${{ needs.prepare-smoke-bundle.outputs.workspace_ref }}
          token: ${{ secrets.FILEUNI_PRIVATE_WORKSPACE_READ_TOKEN }}
          path: workspace
          submodules: true
          fetch-depth: 0

      - name: Download smoke bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.SMOKE_BUNDLE_ARTIFACT }}
          path: smoke-bundle

      - name: Install rclone
        run: |
          set -euo pipefail

          curl -fsSL "https://downloads.rclone.org/rclone-current-linux-amd64.zip" -o /tmp/rclone.zip
          rm -rf /tmp/rclone-extract
          mkdir -p /tmp/rclone-extract
          unzip -q /tmp/rclone.zip -d /tmp/rclone-extract
          sudo install -m 755 /tmp/rclone-extract/rclone-*-linux-amd64/rclone /usr/local/bin/rclone
          rclone version

      - name: Run smoke test
        shell: bash
        env:
          FILEUNI_TEST_BINARY: ${{ github.workspace }}/smoke-bundle/fileuni
          RUST_BACKTRACE: 1
          RUST_TEST_THREADS: 1
        run: |
          set -euo pipefail

          export FILEUNI_TEST_BINARY="$GITHUB_WORKSPACE/smoke-bundle/fileuni"
          printf 'FILEUNI_TEST_BINARY=%s\n' "$FILEUNI_TEST_BINARY"
          chmod +x "smoke-bundle/fileuni" "smoke-bundle/${{ matrix.test_name }}"
          test -x "$FILEUNI_TEST_BINARY"
          "smoke-bundle/${{ matrix.test_name }}" --no-capture 2>&1 | tee "/tmp/${{ matrix.test_name }}.log"

  webui-e2e:
    name: webui-e2e-playwright
    runs-on: ubuntu-latest
    needs: prepare-smoke-bundle
    timeout-minutes: 90
    steps:
      - name: Checkout workspace
        uses: actions/checkout@v4
        with:
          repository: ${{ env.WORKSPACE_REPO }}
          ref: ${{ needs.prepare-smoke-bundle.outputs.workspace_ref }}
          token: ${{ secrets.FILEUNI_PRIVATE_WORKSPACE_READ_TOKEN }}
          path: workspace
          submodules: true
          fetch-depth: 0

      - name: Download smoke bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.SMOKE_BUNDLE_ARTIFACT }}
          path: smoke-bundle

      - name: Setup Bun
        id: setup-bun-webui-e2e
        uses: oven-sh/setup-bun@v2
        continue-on-error: true

      - name: Fallback install Bun via npm
        if: steps.setup-bun-webui-e2e.outcome == 'failure'
        shell: bash
        run: |
          set -euo pipefail
          npm install -g bun@1.3.12
          bun --version

      - name: Install Playwright dependencies
        working-directory: workspace/apps/integration-tests/e2e
        run: |
          bun install --frozen-lockfile
          bunx playwright install chromium

      - name: Run web UI E2E test
        working-directory: workspace/apps/integration-tests/e2e
        env:
          FILEUNI_TEST_BINARY: ${{ github.workspace }}/smoke-bundle/fileuni_test_server
          FILEUNI_E2E_BASE_URL: http://127.0.0.1:4010
          FILEUNI_E2E_SERVER_COMMAND: FILEUNI_E2E_ENABLE_FILE_COMPRESS=1 ${{ github.workspace }}/smoke-bundle/fileuni_e2e_server --port 4010
        run: |
          chmod +x "${GITHUB_WORKSPACE}/smoke-bundle/fileuni_test_server" "${GITHUB_WORKSPACE}/smoke-bundle/fileuni_e2e_server"
          test -x "$FILEUNI_TEST_BINARY"
          bun run test

      - name: Upload web UI E2E step screenshots
        id: upload-webui-e2e-step-screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: webui-e2e-step-screenshots
          path: workspace/apps/integration-tests/e2e/test-results/**/*.png
          if-no-files-found: warn

      - name: Upload Playwright artifacts
        id: upload-webui-e2e-playwright-artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: webui-e2e-playwright-artifacts
          path: |
            workspace/apps/integration-tests/e2e/test-results/
            workspace/apps/integration-tests/e2e/playwright-report/
          if-no-files-found: warn

      - name: Summarize web UI E2E artifacts
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          {
            printf '## Web UI E2E artifacts\n\n'
            if [ -n "${{ steps.upload-webui-e2e-step-screenshots.outputs.artifact-id }}" ]; then
              printf -- '- Step screenshots: https://github.com/%s/actions/runs/%s/artifacts/%s\n' \
                "${{ github.repository }}" \
                "${{ github.run_id }}" \
                "${{ steps.upload-webui-e2e-step-screenshots.outputs.artifact-id }}"
            fi
            if [ -n "${{ steps.upload-webui-e2e-playwright-artifacts.outputs.artifact-id }}" ]; then
              printf -- '- Full Playwright report and raw results: https://github.com/%s/actions/runs/%s/artifacts/%s\n' \
                "${{ github.repository }}" \
                "${{ github.run_id }}" \
                "${{ steps.upload-webui-e2e-playwright-artifacts.outputs.artifact-id }}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

