name: Release

on:
  workflow_dispatch:
    inputs:
      workspace_ref:
        description: "Source ref in FileUni-WorkSpace (tag/branch/sha). Default: main"
        required: false
        default: "main"
      build_mode:
        description: "Build mode: full (all platforms) or minimal (x64 linux only)"
        type: choice
        options:
          - full
          - minimal
        required: false
        default: "full"
      prerelease:
        description: "Mark as pre-release"
        type: boolean
        required: false
        default: true
      enable_upx:
        description: "Create UPX-compressed copies of binaries"
        type: boolean
        required: false
        default: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.run_id }}
  cancel-in-progress: false

env:
  WORKSPACE_REPO: FileUni/FileUni-WorkSpace
  CARGO_DIST_VERSION: "0.28.0"

jobs:
  resolve-matrix:
    runs-on: ubuntu-latest
    outputs:
      workspace_ref: ${{ steps.meta.outputs.workspace_ref }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      dist_tag: ${{ steps.meta.outputs.dist_tag }}
      pkg_version: ${{ steps.meta.outputs.pkg_version }}
      cli_cargo_dist: ${{ steps.matrix.outputs.cli_cargo_dist }}
      cli_cross: ${{ steps.matrix.outputs.cli_cross }}
      cli_vmactions: ${{ steps.matrix.outputs.cli_vmactions }}
      cli_nfpm: ${{ steps.matrix.outputs.cli_nfpm }}
      has_cargo_dist: ${{ steps.matrix.outputs.has_cargo_dist }}
      has_cross: ${{ steps.matrix.outputs.has_cross }}
      has_vmactions: ${{ steps.matrix.outputs.has_vmactions }}
      has_nfpm: ${{ steps.matrix.outputs.has_nfpm }}
    steps:
      - name: Resolve workspace ref
        id: resolve-ref
        run: |
          ref="${{ github.event.inputs.workspace_ref }}"
          echo "ref=${ref:-main}" >> "$GITHUB_OUTPUT"

      - name: Checkout workspace
        uses: actions/checkout@v4
        with:
          repository: ${{ env.WORKSPACE_REPO }}
          ref: ${{ steps.resolve-ref.outputs.ref }}
          token: ${{ secrets.FILEUNI_WORKSPACE_PAT }}
          path: workspace
          submodules: true
          fetch-depth: 0
          fetch-tags: true

      - name: Checkout community repo
        uses: actions/checkout@v4
        with:
          path: community

      - name: Resolve release metadata
        id: meta
        working-directory: workspace
        run: |
          ref="${{ steps.resolve-ref.outputs.ref }}"
          echo "workspace_ref=${ref}" >> "$GITHUB_OUTPUT"

          pkg_version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "fileuni") | .version')"
          echo "dist_tag=v${pkg_version}" >> "$GITHUB_OUTPUT"
          echo "pkg_version=${pkg_version}" >> "$GITHUB_OUTPUT"

          if echo "${ref}" | grep -qE '^v[0-9]+\.[0-9]+'; then
            release_tag="${ref}"
          else
            release_tag="Release_$(date -u '+%Y%m%d_%H%M%S')"
          fi
          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "::notice::dist_tag=v${pkg_version}  release_tag=${release_tag}  ref=${ref}"

      - name: Resolve build matrix
        id: matrix
        run: |
          mode="${{ github.event.inputs.build_mode }}"
          mode="${mode:-full}"

          # Strip JSONC comments and parse
          sed 's|//.*||' community/.github/build_matrix.jsonc | jq -c '.' > /tmp/matrix.json

          # Filter targets by mode for each build method
          cli_cargo_dist="$(jq -c --arg m "$mode" '[.cli["cargo-dist"][] | select(.mode | index($m))]' /tmp/matrix.json)"
          cli_cross="$(jq -c --arg m "$mode" '[.cli.cross[] | select(.mode | index($m))]' /tmp/matrix.json)"
          cli_vmactions="$(jq -c --arg m "$mode" '[.cli.vmactions[] | select(.mode | index($m))]' /tmp/matrix.json)"

          # nFPM targets: all Linux targets with non-empty nfpm_arch from both cargo-dist and cross
          cli_nfpm="$(jq -c --arg m "$mode" '
            [
              (.cli["cargo-dist"][] | select(.mode | index($m)) | select(.nfpm_arch != "") | {target, nfpm_arch, artifact: ("cli-" + .target)}),
              (.cli.cross[]        | select(.mode | index($m)) | select(.nfpm_arch != "") | {target, nfpm_arch, artifact: ("cli-" + .target)})
            ]
          ' /tmp/matrix.json)"

          echo "cli_cargo_dist=${cli_cargo_dist}" >> "$GITHUB_OUTPUT"
          echo "cli_cross=${cli_cross}" >> "$GITHUB_OUTPUT"
          echo "cli_vmactions=${cli_vmactions}" >> "$GITHUB_OUTPUT"
          echo "cli_nfpm=${cli_nfpm}" >> "$GITHUB_OUTPUT"

          # has_* flags for conditional job execution
          echo "has_cargo_dist=$([ "$(echo "$cli_cargo_dist" | jq 'length')" -gt 0 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "has_cross=$([ "$(echo "$cli_cross" | jq 'length')" -gt 0 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "has_vmactions=$([ "$(echo "$cli_vmactions" | jq 'length')" -gt 0 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "has_nfpm=$([ "$(echo "$cli_nfpm" | jq 'length')" -gt 0 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

          echo "::notice::mode=${mode} cargo_dist=$(echo "$cli_cargo_dist" | jq 'length') cross=$(echo "$cli_cross" | jq 'length') vmactions=$(echo "$cli_vmactions" | jq 'length') nfpm=$(echo "$cli_nfpm" | jq 'length')"

  build-frontends:
    needs: resolve-matrix
    runs-on: ubuntu-latest
    steps:
      - name: Checkout workspace
        uses: actions/checkout@v4
        with:
          repository: ${{ env.WORKSPACE_REPO }}
          ref: ${{ needs.resolve-matrix.outputs.workspace_ref }}
          token: ${{ secrets.FILEUNI_WORKSPACE_PAT }}
          path: workspace
          submodules: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache Bun
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            workspace/frontends/node_modules
            workspace/frontends/cli/node_modules
            workspace/frontends/shared/node_modules
          key: bun-${{ hashFiles('workspace/frontends/bun.lock') }}
          restore-keys: bun-

      - name: Build frontends
        working-directory: workspace/frontends
        run: |
          bun install
          bun run --cwd cli build
          test -f cli/dist/index.html

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: workspace/frontends/cli/dist

  # ============================================================
  # Tier 1/2: cargo-dist native builds
  # ============================================================
  build-cli:
    needs: [resolve-matrix, build-frontends]
    if: needs.resolve-matrix.outputs.has_cargo_dist == 'true'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.resolve-matrix.outputs.cli_cargo_dist) }}
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout workspace
        uses: actions/checkout@v4
        with:
          repository: ${{ env.WORKSPACE_REPO }}
          ref: ${{ needs.resolve-matrix.outputs.workspace_ref }}
          token: ${{ secrets.FILEUNI_WORKSPACE_PAT }}
          path: workspace
          submodules: true
          fetch-depth: 0
          fetch-tags: true

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: workspace/frontends/cli/dist

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cargo-dist
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-dist@${{ env.CARGO_DIST_VERSION }}

      - name: Install musl-tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Setup Zig (for cross-compilation)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        uses: mlugg/setup-zig@v2
        with:
          version: "0.13.0"

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: workspace
          key: ${{ matrix.target }}

      - name: Build via cargo-dist
        working-directory: workspace
        run: dist build --tag="${{ needs.resolve-matrix.outputs.dist_tag }}" --target "${{ matrix.target }}" --artifacts=local

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}
          path: workspace/target/distrib/*

  # ============================================================
  # Cross-compiled builds (Linux exotic + Android)
  # ============================================================
  build-cli-cross:
    needs: [resolve-matrix, build-frontends]
    if: needs.resolve-matrix.outputs.has_cross == 'true'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.resolve-matrix.outputs.cli_cross) }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout workspace
        uses: actions/checkout@v4
        with:
          repository: ${{ env.WORKSPACE_REPO }}
          ref: ${{ needs.resolve-matrix.outputs.workspace_ref }}
          token: ${{ secrets.FILEUNI_WORKSPACE_PAT }}
          path: workspace
          submodules: true

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: workspace/frontends/cli/dist

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: workspace
          key: cross-${{ matrix.target }}

      - name: Build via cross
        working-directory: workspace
        run: cross build --release --package fileuni --target "${{ matrix.target }}"

      - name: Package binary
        run: |
          target="${{ matrix.target }}"
          bin="workspace/target/${target}/release/fileuni"
          if [ ! -f "${bin}" ]; then
            bin="workspace/target/${target}/release/fileuni.exe"
          fi
          mkdir -p dist
          if echo "${target}" | grep -q "windows"; then
            zip "dist/fileuni-${target}.zip" "${bin}"
          else
            tar -cJf "dist/fileuni-${target}.tar.xz" -C "$(dirname "${bin}")" "$(basename "${bin}")"
          fi

      - name: Create UPX-compressed copy
        if: matrix.upx && github.event.inputs.enable_upx != 'false'
        run: |
          target="${{ matrix.target }}"
          bin="workspace/target/${target}/release/fileuni"
          if [ ! -f "${bin}" ]; then
            echo "::warning::Binary not found for UPX, skipping"
            exit 0
          fi

          sudo apt-get update -qq && sudo apt-get install -y -qq upx-ucl > /dev/null 2>&1

          cp "${bin}" "${bin}-upx"
          upx --best --lzma "${bin}-upx" || { echo "::warning::UPX compression failed for ${target}"; rm -f "${bin}-upx"; exit 0; }

          mkdir -p dist-upx
          tar -cJf "dist-upx/fileuni-${target}-upx.tar.xz" -C "$(dirname "${bin}")" "fileuni-upx"

      - name: Upload UPX artifacts
        if: matrix.upx && github.event.inputs.enable_upx != 'false'
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}-upx
          path: dist-upx/*
          if-no-files-found: ignore

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}
          path: dist/*

  # ============================================================
  # BSD builds via vmactions (FreeBSD native VM)
  # ============================================================
  build-cli-bsd:
    needs: [resolve-matrix, build-frontends]
    if: needs.resolve-matrix.outputs.has_vmactions == 'true'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.resolve-matrix.outputs.cli_vmactions) }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout workspace
        uses: actions/checkout@v4
        with:
          repository: ${{ env.WORKSPACE_REPO }}
          ref: ${{ needs.resolve-matrix.outputs.workspace_ref }}
          token: ${{ secrets.FILEUNI_WORKSPACE_PAT }}
          path: workspace
          submodules: true

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: workspace/frontends/cli/dist

      - name: Build on FreeBSD
        if: matrix.os == 'freebsd'
        uses: vmactions/freebsd-vm@v1
        with:
          release: ${{ matrix.release }}
          usesh: true
          copyback: true
          mem: 8192
          prepare: |
            pkg install -y rust curl
          run: |
            cd workspace
            cargo build --release --package fileuni
            ls -la target/release/fileuni

      - name: Package binary
        run: |
          target="${{ matrix.target }}"
          bin="workspace/target/release/fileuni"
          if [ ! -f "${bin}" ]; then
            echo "::error::Binary not found at ${bin}"
            exit 1
          fi
          mkdir -p dist
          tar -cJf "dist/fileuni-${target}.tar.xz" -C "$(dirname "${bin}")" "$(basename "${bin}")"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}
          path: dist/*

  # ============================================================
  # Linux packaging via nFPM (deb/rpm/apk/archlinux/ipk)
  # ============================================================
  package-linux:
    needs: [resolve-matrix, build-cli, build-cli-cross]
    if: ${{ always() && !cancelled() && needs.resolve-matrix.outputs.has_nfpm == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.resolve-matrix.outputs.cli_nfpm) }}
    steps:
      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: artifact

      - name: Extract binary
        run: |
          mkdir -p binary
          file="$(ls artifact/fileuni-*.tar.xz 2>/dev/null | head -1)"
          if [ -n "${file}" ]; then
            tar -xJf "${file}" -C binary
          else
            cp artifact/fileuni binary/ 2>/dev/null || true
          fi
          chmod +x binary/fileuni || true
          ls -la binary/

      - name: Install nFPM
        uses: secondlife/setup-nfpm@v1

      - name: Create nfpm config
        run: |
          cat > nfpm.yaml <<'NFPM'
          name: fileuni
          arch: ${NFPM_ARCH}
          version: ${VERSION}
          maintainer: FileUni Team <contact@fileuni.com>
          description: FileUni - Modular file platform
          homepage: https://github.com/FileUni
          license: MIT
          contents:
            - src: ./binary/fileuni
              dst: /usr/bin/fileuni
              file_info:
                mode: 0755
          NFPM

      - name: Build packages
        env:
          NFPM_ARCH: ${{ matrix.nfpm_arch }}
          VERSION: ${{ needs.resolve-matrix.outputs.pkg_version }}
        run: |
          mkdir -p packages
          target="${{ matrix.target }}"

          for fmt in deb rpm apk archlinux ipk; do
            nfpm package --packager "${fmt}" --config nfpm.yaml --target "packages/" 2>&1 || echo "::warning::${fmt} packaging failed for ${target}"
          done

          ls -la packages/

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.target }}
          path: packages/*

  publish:
    needs: [resolve-matrix, build-cli, build-cli-cross, build-cli-bsd, package-linux]
    if: ${{ always() && !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "{cli-*,packages-*}"
          path: /tmp/release
          merge-multiple: true

      - name: List release files
        run: |
          echo "=== Release artifacts ==="
          find /tmp/release -type f | sort
          count="$(find /tmp/release -type f | wc -l)"
          echo "Total: ${count} files"
          if [ "${count}" -eq 0 ]; then
            echo "::error::No release artifacts found"
            exit 1
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-matrix.outputs.release_tag }}
          name: ${{ needs.resolve-matrix.outputs.release_tag }}
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
          fail_on_unmatched_files: false
          files: /tmp/release/*
          body: |
            ## FileUni ${{ needs.resolve-matrix.outputs.release_tag }}

            Built from [`${{ needs.resolve-matrix.outputs.workspace_ref }}`](https://github.com/${{ env.WORKSPACE_REPO }}/tree/${{ needs.resolve-matrix.outputs.workspace_ref }})
